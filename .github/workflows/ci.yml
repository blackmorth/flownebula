name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-extension:
    name: Build extension (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Build FlowNebula extension
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/core:/core" \
            -w /core \
            php:${{ matrix.php }}-cli bash -c '
              apt-get update -qq && apt-get install -y -qq autoconf build-essential pkg-config > /dev/null
              phpize && ./configure --enable-flownebula && make
            '

      - name: Run PHP tests (analyzer)
        run: php analyzer/build_graph_test.php

      - name: Run Go tests (agent)
        run: |
          cd analyzer && go test -v .

  node-viewer:
    name: Node (LTS 24) – viewer check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check viewer JS
        run: |
          node -e "
            const fs = require('fs');
            const code = fs.readFileSync('viewer/nebula.js', 'utf8');
            if (!code.includes('fetch') || !code.includes('d3')) throw new Error('viewer/nebula.js invalid');
            console.log('viewer/nebula.js OK');
          "

  test-php-script:
    name: Run example with extension (PHP 8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension, run profiled script, build graph
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            php:8.2-cli bash -c '
              apt-get update -qq && apt-get install -y -qq autoconf build-essential pkg-config > /dev/null
              cd /app/core && phpize && ./configure --enable-flownebula && make install
              echo "extension=flownebula.so" >> /usr/local/etc/php/conf.d/flownebula.ini
              echo "flownebula.trace_path=/tmp/nebula.trace" >> /usr/local/etc/php/conf.d/flownebula.ini
              php /app/examples/test.php
              php /app/analyzer/build_graph.php /tmp/nebula.trace /tmp/nebula.json
              test -f /tmp/nebula.json && echo "Trace and graph OK"
            '
