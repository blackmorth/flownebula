services:
  ui:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - server

  server:
    image: cosmtrek/air
    working_dir: /app
    volumes:
      - ./server:/app
    ports:
      - "8080:8080"
    command: [ "air" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 2s
      timeout: 1s
      retries: 20
    environment:
      - GO_ENV=development
  agent:
    image: golang:1.26-alpine
    working_dir: /app
    volumes:
      - ./agent:/app
      - nebula-sock:/var/run
    command: [
      "go", "run", "./cmd/nebula-agent",
      "--server-url=http://server:8080",
      "--agent-token=nebula_6c14a999cc40487199c94fb65d9670812eddb2b5b66c8394ab1934aa4356f9de"
    ]
    environment:
      - GO_ENV=development
    depends_on:
      server:
        condition: service_healthy
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    volumes:
      - nebula-sock:/var/run
      - nebula-bin:/opt/nebula
    depends_on:
      - agent
    pid: "service:agent"

  caddy:
    image: caddy:2-alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/Caddyfile.dev:/etc/caddy/Caddyfile
    depends_on:
      server:
        condition: service_healthy
      ui:
        condition: service_started

volumes:
  nebula-sock:
  nebula-bin:
